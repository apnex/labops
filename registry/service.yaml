## Two Services: a ClusterIP for in-cluster pulls (kubelet, kaniko) and a
## LoadBalancer sharing the existing 192.168.1.250 VIP via the metallb
## allow-shared-ip annotation, exposing port 5000 on the LAN.
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  type: ClusterIP
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: vip-registry
  namespace: registry
  labels:
    app: registry
  annotations:
    metallb.universe.tf/allow-shared-ip: host
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.250
  selector:
    app: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
