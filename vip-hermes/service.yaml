apiVersion: v1
kind: Service
metadata:
  name: vip-hermes
  namespace: hermes
  annotations:
    metallb.io/allow-shared-ip: host
spec:
  type: LoadBalancer
  selector:
    app: hermes
  ports:
    - name: api
      port: 8642
      targetPort: 8642
    - name: dashboard
      port: 9119
      targetPort: 9119
